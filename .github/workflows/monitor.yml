name: Price Monitor

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

jobs:
  monitor:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Run monitor
        env:
          EMAIL_AUTH_CODE: ${{ secrets.EMAIL_AUTH_CODE }}
        run: python price_monitor_cloud.py

      - name: Save data
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add price_history.json data.json
          git diff --cached --quiet || git commit -m "update price data"
          git push
